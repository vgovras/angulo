name: Deploy to CF Pages

on:
  workflow_dispatch:
    inputs:
      create_project:
        description: 'Create CF Pages project first'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create CF Pages project
        if: ${{ inputs.create_project }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          command: pages project create angulo --production-branch=main

      - name: Deploy to CF Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          command: pages deploy .svelte-kit/cloudflare --project-name=angulo --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
