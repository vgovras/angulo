<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Two intersecting lines -->
  <line x1="100" y1="130" x2="412" y2="330" stroke="#f8fafc" stroke-width="24" stroke-linecap="round"/>
  <line x1="380" y1="100" x2="130" y2="400" stroke="#f8fafc" stroke-width="24" stroke-linecap="round"/>
  <!-- Angle arc at intersection -->
  <path d="M 222 195 A 60 60 0 0 1 280 178" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
  <!-- Point dots -->
  <circle cx="100" cy="130" r="18" fill="#f97316"/>
  <circle cx="412" cy="330" r="18" fill="#06b6d4"/>
  <circle cx="380" cy="100" r="18" fill="#84cc16"/>
  <circle cx="130" cy="400" r="18" fill="#a855f7"/>
</svg>
